[build]
  # Directory to change to before starting a build
  # If your repo root contains library-frontend folder, use: base = "library-frontend"
  # If your repo root IS the library-frontend folder, use: base = "."
  base = "library-frontend"
  
  # Directory that contains the deploy-ready HTML files and assets
  publish = "build"
  
  # Build command (install dependencies first, then build)
  command = "npm ci && npm run build"

# Specify Node version for consistent builds
[build.environment]
  NODE_VERSION = "18"
  # Disable ESLint during build to avoid dependency issues
  DISABLE_ESLINT_PLUGIN = "true"
  CI = "false"

# Redirect all routes to index.html for React SPA (handled by _redirects file in public folder)
# The _redirects file in public/ will be copied to build/ during build
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

